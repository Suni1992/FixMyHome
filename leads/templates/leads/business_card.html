<script>
    function downloadVCard() {
        const vcardData = 
            "BEGIN:VCARD\n" +
            "VERSION:3.0\n" +
            "FN:Sunil Prajapati (FixMyHome)\n" +
            "ORG:FixMyHome Gorakhpur\n" +

            "URL:https://fixmyhomes.in\n" +
            "ADR;TYPE=WORK,POSTAL,PARCEL:;;Gorakhpur;Uttar Pradesh;;India\n" +
            "END:VCARD";
        
        const blob = new Blob([vcardData], { type: "text/vcard" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = "none";
        a.href = url;
        a.download = "Sunil_Prajapati_FixMyHome.vcf";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
